
<!doctype html>
<html lang="en" data-layout="vertical" data-topbar="light" data-sidebar="dark" data-sidebar-size="lg" data-sidebar-image="none">

<head>

    <meta charset="utf-8" />
    <title>Error</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta content="advanexus data development and analysis platform" name="description" />
    <meta content="advanexus" name="author" />
   <!-- App favicon -->
   <link rel="shortcut icon" href="/static/images/favicon.ico">
   <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk&display=swap">


   <!-- Layout config Js -->
   <script src="/static/js/layout.js"></script>
   <!-- Bootstrap Css -->
   <link href="/static/css/bootstrap.min.css" rel="stylesheet" type="text/css" />
   <!-- Icons Css -->
   <link href="/static/css/icons.min.css" rel="stylesheet" type="text/css" />
   <!-- App Css-->
   <link href="/static/css/app.min.css" rel="stylesheet" type="text/css" />
   <!-- custom Css-->
   <link href="/static/css/custom.min.css" rel="stylesheet" type="text/css" />

</head>

<body>

    <!-- auth-page wrapper -->
    <div class="auth-page-wrapper py-5 d-flex justify-content-center align-items-center min-vh-100">

        <!-- auth-page content -->
        <div class="auth-page-content overflow-hidden p-0">
            <div class="container-fluid">
                <div class="row justify-content-center">
                    <div class="col-xl-4 text-center">
                        
    <div class="error-500 position-relative">
        
            <img src="/static/images/errors/404.png" alt="" class="img-fluid error-500-img error-img" />
        

        <h1 class="title text-muted">404</h1>
    </div>

    <br><br><br>

    <div>
        <h4>404 - Not Found</h4>

        <p class="text-muted w-75 mx-auto">
            URL:
            <span id="requested-url">Unavailable</span>
        </p>

        <p class="text-muted w-75 mx-auto">
            The requested URL was not found on the server. If you entered the URL manually please check your spelling and try again.
        </p>

        <br>

        

        <a href="/" class="btn btn-success">
            <i class="mdi mdi-home me-1"></i>Back to home
        </a>
    </div>

    <div class="simple-footer mt-5">
        Copyright &copy; Advanexus
    </div>

    <script>
        (function () {
            var requestedUrlElement = document.getElementById("requested-url");

            if (requestedUrlElement) {
                requestedUrlElement.textContent = window.location.href;
            }
        })();
    </script>

                    </div><!-- end col-->
                </div>
                <!-- end row -->
            </div>
            <!-- end container -->
        </div>
        <!-- end auth-page content -->
    </div>
    <!-- end auth-page-wrapper -->

</body>

</html>
